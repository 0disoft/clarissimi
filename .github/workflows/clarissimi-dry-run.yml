name: Clarissimi dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dogfood-dry-run:
    name: Dry-run dogfood
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run fixture dry-run action
        id: fixture
        uses: ./
        with:
          mode: dry-run
          github-fixture: fixtures/github-merged-pr-basic.json
          summary-path: .clarissimi/dogfood-fixture-summary.json

      - name: Verify fixture dry-run outputs
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.fixture.outputs.draft-count }}" = "1"
          test "${{ steps.fixture.outputs.proposed-entry-count }}" = "0"
          test "${{ steps.fixture.outputs.skipped-entry-count }}" = "0"
          test "${{ steps.fixture.outputs.mode }}" = "dry-run"
          test "${{ steps.fixture.outputs.input-source }}" = "github_fixture"
          test "${{ steps.fixture.outputs.approval-status }}" = "draft"
          test "${{ steps.fixture.outputs.redaction-match-count }}" = "0"
          test -n "${{ steps.fixture.outputs.summary-json-path }}"
          test -f "${{ steps.fixture.outputs.summary-json-path }}"
          SUMMARY_PATH="${{ steps.fixture.outputs.summary-json-path }}" node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const summary = JSON.parse(readFileSync(process.env.SUMMARY_PATH, "utf8"));
          if (summary.mode !== "dry-run") {
            throw new Error(`Expected dry-run summary, got ${summary.mode}.`);
          }
          if (summary.inputSource !== "github_fixture") {
            throw new Error(`Expected github_fixture summary, got ${summary.inputSource}.`);
          }
          if (summary.draftCount !== 1 || summary.proposedEntryCount !== 0) {
            throw new Error("Fixture summary counts drifted.");
          }

          const text = JSON.stringify(summary);
          for (const unsafe of ["Adds a failing parser case", "parses nested input"]) {
            if (text.includes(unsafe)) {
              throw new Error("Summary artifact leaked raw fixture evidence.");
            }
          }
          NODE

      - name: Run event-path dry-run action
        id: event
        uses: ./
        with:
          mode: dry-run
          event-path: fixtures/github-pull-request-merged-event.json

      - name: Verify event-path dry-run outputs
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.event.outputs.draft-count }}" = "1"
          test "${{ steps.event.outputs.proposed-entry-count }}" = "0"
          test "${{ steps.event.outputs.skipped-entry-count }}" = "0"
          test "${{ steps.event.outputs.mode }}" = "dry-run"
          test "${{ steps.event.outputs.input-source }}" = "github_event_path"
          test "${{ steps.event.outputs.approval-status }}" = "draft"
          test "${{ steps.event.outputs.redaction-match-count }}" = "0"
