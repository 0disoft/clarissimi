name: Clarissimi live provider smoke
run-name: ${{ inputs.evidence-id && format('Clarissimi live provider smoke · {0}', inputs.evidence-id) || 'Clarissimi live provider smoke' }}

on:
  workflow_dispatch:
    inputs:
      provider-model:
        description: OpenAI-compatible model name for the smoke run.
        required: true
      provider-endpoint:
        description: Optional OpenAI-compatible chat completions endpoint override.
        required: false
      provider-thinking:
        description: Optional OpenAI-compatible thinking mode. Use disabled for providers such as minimax-m3.
        required: false
      evidence-id:
        description: Optional 32-character correlation id for release evidence orchestration.
        required: false

permissions:
  contents: read

concurrency:
  group: clarissimi-live-provider-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-provider-smoke:
    name: Live provider smoke
    runs-on: ubuntu-latest

    steps:
      - name: Verify provider inputs
        shell: bash
        env:
          CLARISSIMI_PROVIDER_MODEL: ${{ inputs.provider-model }}
          CLARISSIMI_PROVIDER_ENDPOINT: ${{ inputs.provider-endpoint }}
          CLARISSIMI_PROVIDER_THINKING: ${{ inputs.provider-thinking }}
        run: |
          set -euo pipefail
          if [ -z "${CLARISSIMI_PROVIDER_MODEL//[[:space:]]/}" ]; then
            echo "::error title=Missing provider model::Set provider-model before running Clarissimi live provider smoke."
            exit 2
          fi

          if [ -n "${CLARISSIMI_PROVIDER_ENDPOINT}" ] && [[ "${CLARISSIMI_PROVIDER_ENDPOINT}" != https://* ]]; then
            echo "::error title=Invalid provider endpoint::provider-endpoint must be an https URL."
            exit 2
          fi

          if [ -n "${CLARISSIMI_PROVIDER_THINKING}" ] && [ "${CLARISSIMI_PROVIDER_THINKING}" != "disabled" ]; then
            echo "::error title=Unsupported provider thinking mode::provider-thinking currently supports only disabled."
            exit 2
          fi

      - name: Verify evidence correlation id
        if: ${{ inputs.evidence-id != '' }}
        shell: bash
        env:
          EVIDENCE_ID: ${{ inputs.evidence-id }}
        run: |
          set -euo pipefail
          [[ "$EVIDENCE_ID" =~ ^[0-9a-f]{32}$ ]]

      - name: Verify provider secret
        shell: bash
        env:
          CLARISSIMI_PROVIDER_TOKEN: ${{ secrets.CLARISSIMI_PROVIDER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLARISSIMI_PROVIDER_TOKEN}" ]; then
            echo "::error title=Missing repository secret::Set CLARISSIMI_PROVIDER_TOKEN before running Clarissimi live provider smoke."
            exit 2
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live provider smoke
        env:
          CLARISSIMI_PROVIDER_TOKEN: ${{ secrets.CLARISSIMI_PROVIDER_TOKEN }}
          CLARISSIMI_PROVIDER_MODEL: ${{ inputs.provider-model }}
          CLARISSIMI_PROVIDER_ENDPOINT: ${{ inputs.provider-endpoint }}
          CLARISSIMI_PROVIDER_THINKING: ${{ inputs.provider-thinking }}
        run: pnpm run live-provider-smoke
