name: Clarissimi live provider smoke

on:
  workflow_dispatch:
    inputs:
      provider-endpoint:
        description: Optional OpenAI-compatible chat completions endpoint override.
        required: false

permissions:
  contents: read

concurrency:
  group: clarissimi-live-provider-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-provider-smoke:
    name: Live provider smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live provider smoke
        env:
          CLARISSIMI_PROVIDER_TOKEN: ${{ secrets.CLARISSIMI_PROVIDER_TOKEN }}
          CLARISSIMI_PROVIDER_MODEL: ${{ vars.CLARISSIMI_PROVIDER_MODEL }}
          CLARISSIMI_PROVIDER_ENDPOINT: ${{ inputs.provider-endpoint }}
        run: pnpm run live-provider-smoke
