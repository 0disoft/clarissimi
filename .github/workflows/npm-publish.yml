name: Stage npm CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact standalone CLI package version
        required: true
        type: string
      sha:
        description: Exact 40-character source commit SHA
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  stage:
    name: Stage standalone CLI
    if: github.repository == '0disoft/clarissimi'
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Validate dispatch inputs
        env:
          RELEASE_SHA: ${{ inputs.sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${RELEASE_VERSION}" =~ ^0\.[0-9]+\.[0-9]+$ ]]

      - name: Checkout exact source commit
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pin trusted-publishing npm client
        run: npm install --global npm@11.16.0

      - name: Verify exact source and package version
        env:
          RELEASE_SHA: ${{ inputs.sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"
          test "$(node --print "require('./distribution/npm/clarissimi/package.json').version")" = "${RELEASE_VERSION}"

      - name: Verify package and isolated consumer install
        run: pnpm run verify:cli-package

      - name: Require existing package before OIDC publication
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          npm view clarissimi name --json >/dev/null
          if npm view "clarissimi@${RELEASE_VERSION}" version --json >/dev/null 2>&1; then
            echo "clarissimi@${RELEASE_VERSION} already exists and cannot be reused." >&2
            exit 1
          fi

      - name: Stage with npm trusted publishing
        working-directory: .tmp/npm/clarissimi
        run: npm stage publish --access public --provenance
