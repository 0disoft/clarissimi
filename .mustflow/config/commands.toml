run_policy = "agent_allowed"
description = "Push the validated Clarissimi main branch to origin without force."
argv = ["git", "push", "origin", "main"]
cwd = "."
timeout_seconds = 180
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = true
destructive = false
required_after = ["git_commit_contributor_features", "user_authorized_push"]
