schema_version = "1"

[defaults]
missing_behavior = "do_not_guess"
allow_inferred_commands = false
require_lifecycle = true
require_timeout_for_oneshot = true
deny_unmanaged_long_running = true
default_cwd = "."
default_timeout_seconds = 600
stdin = "closed"
max_output_bytes = 1048576
on_timeout = "terminate_process_tree"
kill_after_seconds = 5
env_policy = "minimal"
env_allowlist = []

[resources.build_outputs]
type = "path"
paths = ["packages/*/dist/**", "*.tsbuildinfo", "packages/*/*.tsbuildinfo"]
concurrency = "exclusive_writer"
description = "Ignored TypeScript workspace build outputs and incremental metadata."

[resources.action_bundle]
type = "path"
paths = ["action-dist/index.js"]
concurrency = "exclusive_writer"
description = "Tracked GitHub Action runtime bundle generated from the maintained Action source."

[resources.git_state]
type = "path"
paths = [".git/index", ".git/refs/**", ".git/logs/**", ".git/objects/**"]
concurrency = "exclusive_writer"
description = "Clarissimi local Git index, commit objects, refs, and reflogs."

[intents.changes_status]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Show concise Clarissimi worktree state without modifying Git state."
argv = ["git", "status", "--short", "--branch"]
cwd = "."
timeout_seconds = 30
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = false
destructive = false
required_after = ["before_edit", "before_final_report"]

[intents.changes_diff_summary]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Summarize unstaged Clarissimi changes without modifying Git state."
argv = ["git", "diff", "--stat"]
cwd = "."
timeout_seconds = 30
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = false
destructive = false
required_after = ["code_change", "documentation_change", "before_final_report"]

[intents.build]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Compile all Clarissimi TypeScript workspace packages."
argv = ["pnpm", "run", "build"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = ["packages/*/dist/**", "*.tsbuildinfo", "packages/*/*.tsbuildinfo"]
effects = [
  { type = "write", mode = "replace", path = "packages/*/dist/**", lock = "build_outputs", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["typescript_change", "public_api_change"]

[intents.test_related]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Build the workspace and run the complete Clarissimi test suite used for related feature changes."
argv = ["pnpm", "run", "test"]
cwd = "."
timeout_seconds = 1200
stdin = "closed"
success_exit_codes = [0]
writes = ["packages/*/dist/**", "*.tsbuildinfo", "packages/*/*.tsbuildinfo"]
effects = [
  { type = "write", mode = "replace", path = "packages/*/dist/**", lock = "build_outputs", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["behavior_change", "test_change", "schema_change"]

[intents.test_automation_contributors]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Build and run schema, GitHub, renderer, CLI, and Action tests covering automation contributor behavior."
argv = [
  "pnpm",
  "exec",
  "node",
  "--test",
  "packages/schemas/test/*.test.mjs",
  "packages/github/test/*.test.mjs",
  "packages/renderers/test/*.test.mjs",
  "packages/cli/test/*.test.mjs",
  "packages/action/test/*.test.mjs",
]
cwd = "."
timeout_seconds = 1200
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = false
destructive = false
preconditions = [
  { kind = "artifact_freshness", artifact = "packages/renderers/dist/index.js", sources = [
    "packages/*/src/**",
    "packages/*/tsconfig.json",
    "tsconfig.json",
  ], satisfy_intent = "build" },
]
required_after = ["automation_contributor_change", "automation_contributor_test_change"]

[intents.test_cli_lock_concurrency]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the focused concurrent ledger import regression with worker failure diagnostics."
argv = [
  "node",
  "--test",
  "--test-name-pattern=import-draft serializes concurrent ledger updates",
  "packages/cli/test/cli.test.mjs",
]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = false
destructive = false
preconditions = [
  { kind = "artifact_freshness", artifact = "packages/cli/dist/index.js", sources = [
    "packages/cli/src/**",
    "packages/cli/tsconfig.json",
    "tsconfig.json",
  ], satisfy_intent = "build" },
]
required_after = ["cli_lock_change", "cli_lock_test_change"]

[intents.lint]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run Oxlint with warnings denied over maintained source files."
argv = ["pnpm", "run", "lint"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = false
destructive = false
required_after = ["typescript_change", "javascript_change"]

[intents.format]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Check maintained files with Oxfmt without rewriting them."
argv = ["pnpm", "run", "format"]
cwd = "."
