effects = [
  { type = "write", mode = "replace", path = "packages/*/dist/**", lock = "build_outputs", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["behavior_change", "test_change", "schema_change"]

[intents.test_automation_contributors]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Build and run schema, GitHub, renderer, CLI, and Action tests covering automation contributor behavior."
argv = [
  "pnpm",
  "exec",
  "node",
  "--test",
  "packages/schemas/test/*.test.mjs",
  "packages/github/test/*.test.mjs",
  "packages/renderers/test/*.test.mjs",
  "packages/cli/test/*.test.mjs",
  "packages/action/test/*.test.mjs",
]
cwd = "."
timeout_seconds = 1200
stdin = "closed"
success_exit_codes = [0]
writes = []
effects = []
network = false
destructive = false
preconditions = [
  { kind = "artifact_freshness", artifact = "packages/renderers/dist/index.js", sources = [
    "packages/*/src/**",
    "packages/*/tsconfig.json",
    "tsconfig.json",
