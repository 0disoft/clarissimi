run_policy = "agent_allowed"
description = "Amend the contributor feature commit with the reviewed local push-approval contract."
argv = ["git", "commit", "--amend", "--no-edit"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = [".git/index", ".git/refs/**", ".git/logs/**", ".git/objects/**"]
effects = [{ type = "write", mode = "replace", path = ".git/**", lock = "git_state", concurrency = "exclusive" }]
