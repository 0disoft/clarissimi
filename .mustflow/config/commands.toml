[intents.format_write]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Rewrite maintained Clarissimi source, configuration, and documentation with Oxfmt."
argv = ["pnpm", "exec", "oxfmt", "--write"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = ["**/*.ts", "**/*.js", "**/*.mjs", "**/*.json", "**/*.md", "**/*.yml", "**/*.yaml"]
effects = [
  { type = "write", mode = "replace", path = "**/*.ts", concurrency = "exclusive" },
  { type = "write", mode = "replace", path = "**/*.mjs", concurrency = "exclusive" },
  { type = "write", mode = "replace", path = "**/*.json", concurrency = "exclusive" },
  { type = "write", mode = "replace", path = "**/*.md", concurrency = "exclusive" },
  { type = "write", mode = "replace", path = "**/*.yml", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["before_format_check_when_maintained_files_changed"]

[intents.docs_validate_fast]
