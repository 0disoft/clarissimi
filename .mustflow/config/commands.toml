[intents.git_stage_contributor_features]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Stage the reviewed Clarissimi gallery, automation-contributor, documentation, test, bundle, and local command-contract changes."
argv = ["git", "add", "--", "."]
cwd = "."
timeout_seconds = 60
stdin = "closed"
success_exit_codes = [0]
writes = [".git/index"]
effects = [{ type = "write", mode = "replace", path = ".git/index", lock = "git_state", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["contributor_feature_validation_complete"]

[intents.git_commit_contributor_features]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Commit the reviewed contributor gallery and automation recognition feature set."
argv = [
  "git",
  "commit",
  "-m",
  "feat(contributors): recognize automation by default",
]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = [".git/index", ".git/refs/**", ".git/logs/**", ".git/objects/**"]
effects = [{ type = "write", mode = "replace", path = ".git/**", lock = "git_state", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["git_stage_contributor_features"]

[intents.git_amend_contributor_features]
