name: Clarissimi
description: Draft maintainer-approved contribution recognition summaries.
author: 0disoft

inputs:
  mode:
    description: Action mode. Use dry-run for summaries, propose for approved event drafts, stage-draft for draft review PRs, or promote-draft for an approved draft file.
    required: false
    default: propose
  event-path:
    description: Optional GitHub event payload path for local runs and write-mode live collection.
    required: false
  github-fixture:
    description: Optional GitHub merged pull request fixture path for fixture-first runs.
    required: false
  config-path:
    description: Optional Clarissimi config file path. Supports explicit JSON config files or clarissimi.config.ts.
    required: false
  draft-path:
    description: Approved .clarissimi/drafts/*.json path required by promote-draft mode.
    required: false
  base-branch:
    description: Base branch for propose, stage-draft, and promote-draft mode pull requests.
    required: false
    default: main
  remote-name:
    description: Git remote name used to publish propose and stage-draft mode branches.
    required: false
    default: origin
  staging-dir:
    description: Optional temporary staging directory for propose or stage-draft generated files.
    required: false
  summary-path:
    description: Optional workspace-relative path for a sanitized JSON run summary artifact.
    required: false
  provider:
    description: Draft provider id. Omit to use config-path provider or the runner fake default; use openai-compatible for an explicit live provider.
    required: false
  provider-model:
    description: Provider model name required when provider is openai-compatible.
    required: false
  provider-endpoint:
    description: Optional OpenAI-compatible chat completions endpoint.
    required: false
  provider-thinking:
    description: Optional OpenAI-compatible thinking mode. Use disabled for providers that emit hidden reasoning in message content.
    required: false

outputs:
  draft-count:
    description: Number of recognition drafts created.
    value: ${{ steps.clarissimi.outputs.draft-count }}
  proposed-entry-count:
    description: Number of proposed public entries.
    value: ${{ steps.clarissimi.outputs.proposed-entry-count }}
  skipped-entry-count:
    description: Number of skipped events.
    value: ${{ steps.clarissimi.outputs.skipped-entry-count }}
  mode:
    description: Action output mode.
    value: ${{ steps.clarissimi.outputs.mode }}
  input-source:
    description: Source used for the action input.
    value: ${{ steps.clarissimi.outputs.input-source }}
  approval-status:
    description: Draft approval status when a draft exists.
    value: ${{ steps.clarissimi.outputs.approval-status }}
  redaction-match-count:
    description: Number of redaction matches found before drafting.
    value: ${{ steps.clarissimi.outputs.redaction-match-count }}
  staged-file-count:
    description: Number of generated files staged in propose or stage-draft mode.
    value: ${{ steps.clarissimi.outputs.staged-file-count }}
  proposal-branch:
    description: Proposal branch name created in propose or stage-draft mode.
    value: ${{ steps.clarissimi.outputs.proposal-branch }}
  proposal-commit-sha:
    description: Proposal branch commit SHA created in propose or stage-draft mode.
    value: ${{ steps.clarissimi.outputs.proposal-commit-sha }}
  proposal-pull-request-number:
    description: Proposal pull request number created or updated in propose or stage-draft mode.
    value: ${{ steps.clarissimi.outputs.proposal-pull-request-number }}
  proposal-pull-request-url:
    description: Proposal pull request URL created or updated in propose or stage-draft mode.
    value: ${{ steps.clarissimi.outputs.proposal-pull-request-url }}
  proposal-pull-request-action:
    description: Whether propose or stage-draft mode created or updated the pull request.
    value: ${{ steps.clarissimi.outputs.proposal-pull-request-action }}
  summary-json-path:
    description: Absolute path to the sanitized JSON summary artifact when summary-path is set.
    value: ${{ steps.clarissimi.outputs.summary-json-path }}

runs:
  using: composite
  steps:
    - name: Run Clarissimi
      id: clarissimi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ (inputs.mode == 'propose' || inputs.mode == 'stage-draft' || inputs.mode == 'promote-draft') && github.token || '' }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_EVENT_PATH: ${{ inputs.event-path }}
        INPUT_GITHUB_FIXTURE: ${{ inputs.github-fixture }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
        INPUT_DRAFT_PATH: ${{ inputs.draft-path }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_REMOTE_NAME: ${{ inputs.remote-name }}
        INPUT_STAGING_DIR: ${{ inputs.staging-dir }}
        INPUT_SUMMARY_PATH: ${{ inputs.summary-path }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_PROVIDER_MODEL: ${{ inputs.provider-model }}
        INPUT_PROVIDER_ENDPOINT: ${{ inputs.provider-endpoint }}
        INPUT_PROVIDER_THINKING: ${{ inputs.provider-thinking }}
        CLARISSIMI_PROVIDER_TOKEN: ${{ env.CLARISSIMI_PROVIDER_TOKEN }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/action-dist/index.js"
