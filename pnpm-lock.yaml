lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: ^6.0.3
        version: 6.0.3

  packages/core:
    dependencies:
      '@clarissimi/redaction':
        specifier: workspace:*
        version: link:../redaction
      '@clarissimi/schemas':
        specifier: workspace:*
        version: link:../schemas

  packages/providers:
