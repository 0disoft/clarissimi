      '@clarissimi/core':
        specifier: workspace:*
        version: link:../core
      '@clarissimi/schemas':
        specifier: workspace:*
        version: link:../schemas

  packages/redaction: {}

  packages/schemas: {}

packages:

  typescript@6.0.3:
    resolution: {integrity: sha512-y2TvuxSZPDyQakkFRPZHKFm+KKVqIisdg9/CZwm9ftvKXLP8NRWj38/ODjNbr43SsoXqNuAisEf1GdCxqWcdBw==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  typescript@6.0.3: {}
